name: CI - Build, Push & Scan

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (local, not pushed yet)
        run: |
          IMAGE_LC=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_LC=$IMAGE_LC" >> $GITHUB_ENV
          docker build -t "$IMAGE_LC:ci-${{ github.sha }}" .

      - name: Scan image with Trivy (fail on CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_LC }}:ci-${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: false

      - name: Push image to GHCR (only if scan passed)
        run: |
          docker tag "$IMAGE_LC:ci-${{ github.sha }}" "$IMAGE_LC:1.0.0"
          docker tag "$IMAGE_LC:ci-${{ github.sha }}" "$IMAGE_LC:latest"
          docker push "$IMAGE_LC:1.0.0"
          docker push "$IMAGE_LC:latest"
